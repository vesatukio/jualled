<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Duta Terang LED</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00bcd4">

    <style>
        :root { 
            --primary: #00bcd4; 
            --pink: #e91e63; 
            --wa: #25D366; 
            --danger: #ff4d4d;
        }
        
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f5f6f8; padding-bottom: 180px; }
        header { background: var(--primary); color: #fff; text-align: center; padding: 12px; font-size: 16px; }

        /* MODAL POPUP AWAL */
        #installModal {
            display: none; position: fixed; z-index: 20000; left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); align-items: center; justify-content: center;
        }
        .promo-box {
            background: #fff; width: 80%; max-width: 300px; padding: 20px; border-radius: 15px;
            text-align: center;
        }
        .btn-main { background: var(--primary); color: #fff; border: none; padding: 10px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin-bottom: 10px; }

        /* INSTALL KECIL KANAN */
        #installFloat {
            display: none; position: fixed; right: 0; top: 50%; transform: translateY(-50%);
            background: var(--primary); color: white; border: none; padding: 10px 5px;
            border-radius: 8px 0 0 8px; font-size: 10px; font-weight: bold; z-index: 9999;
            writing-mode: vertical-rl;
        }

        /* KATEGORI - Perbaikan agar bisa digeser di HP */
.category { 
    display: flex; 
    gap: 8px; 
    padding: 12px 10px; 
    background: #fff; 
    position: sticky; 
    top: 0; 
    z-index: 100; 
    overflow-x: auto; /* Mengizinkan geser horizontal */
    white-space: nowrap; /* Mencegah tombol turun ke baris baru */
    border-bottom: 1px solid #eee;
    scrollbar-width: none; /* Menghilangkan scrollbar di Firefox */
    -ms-overflow-style: none; /* Menghilangkan scrollbar di IE/Edge */
}

/* Menghilangkan scrollbar di Chrome, Safari, dan Opera */
.category::-webkit-scrollbar {
    display: none;
}

.category button { 
    flex: 0 0 auto; /* Mencegah tombol menyusut (gepeng) */
    border: 1px solid #ddd; 
    padding: 8px 16px; 
    border-radius: 20px; 
    background: #fff; 
    color: #555; 
    font-size: 13px; 
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
}

        /* PRODUK - Dioptimalkan untuk 2 Kolom di HP */
.container { 
    padding: 10px 8px; /* Tambah padding atas sedikit agar tidak nempel kategori */
    display: grid; 
    grid-template-columns: repeat(2, 1fr); 
    gap: 10px; /* Jarak antar kartu sedikit diperlebar agar lebih lega */
    max-width: 600px; 
    margin: auto; 
    align-items: stretch; /* Memastikan tinggi kartu sama rata */
}
        .card { background: #fff; border-radius: 10px; padding: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; flex-direction: column; position: relative; transition: opacity 0.3s ease; }
        .card img { width: 100%; height: 110px; object-fit: contain; background: #f9f9f9; border-radius: 8px; }
        .price-old { text-decoration: line-through; color: blue; font-size: 12px; font-weight: bold; }
        .price-new { color: var(--pink); font-weight: bold; font-size: 14px; }
        
        .qty { display: flex; justify-content: space-between; align-items: center; background: #f1f3f4; border-radius: 6px; padding: 2px; margin-top: 8px; }
        .qty button { width: 28px; height: 28px; border: none; background: var(--primary); color: #fff; border-radius: 4px; font-size: 16px; cursor: pointer; }

        /* KERANJANG */
        #cart { 
            position: fixed; bottom: 10px; left: 10px; right: 10px; 
            background: #fff; padding: 12px; border-radius: 12px; 
            box-shadow: 0 -5px 20px rgba(0,0,0,0.15); 
            z-index: 1000; display: flex; align-items: flex-end; gap: 10px;
        }
        #cart.hide { display: none; }
        .cart-right { flex-grow: 1; display: flex; flex-direction: column; align-items: flex-end; }
        #cart-list { 
            width: 100%; max-height: 80px; overflow-y: auto; font-size: 11px; 
            color: #444; border-bottom: 1px dashed #ddd; margin-bottom: 5px; text-align: right;
        }
        #total { font-size: 16px; font-weight: 900; color: var(--primary); margin-bottom: 5px; }
        #btn-wa { background: var(--wa); color: #fff; text-decoration: none; padding: 8px 15px; border-radius: 8px; font-size: 14px; font-weight: bold; }

        /* ZOOM */
        #zoomModal {
            display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); align-items: center; justify-content: center; cursor: zoom-out;
        }
        #img-zoomed { max-width: 90%; max-height: 80%; border-radius: 10px; animation: zoomIn 0.2s ease; }
        @keyframes zoomIn { from {transform: scale(0.8); opacity: 0;} to {transform: scale(1); opacity: 1;} }

        .promo-running { background: #fff3cd; color: #856404; padding: 5px; font-size: 13px; font-weight: bold; border-bottom: 1px solid #ffeeba; }
        #jam-sekarang { color: #d9534f; }
    </style>
</head>
<body>

<header><b>DUTA TERANG LED</b></header>

<div class="promo-running">
    <marquee behavior="scroll" direction="left" scrollamount="5">
        <span id="jam-sekarang"></span> | ✨ Duta Terang LED: Solusi Lampu Hemat & Berkualitas | ✅ Melayani Pengiriman Seluruh Indonesia | 🤝 Transaksi Aman Bisa COD | 💡 Terang Lampunya, Hemat Biayanya!
    </marquee>
</div>
    
<div id="installModal">
    <div class="promo-box">
        <h3>Pasang Aplikasi?</h3>
        <p style="font-size: 13px;">Cek harga & stok jadi lebih mudah!</p>
        <button class="btn-main" onclick="triggerInstall()">PASANG</button>
        <button onclick="closePromo()" style="background:none; border:none; color:#999; font-size:12px;">Nanti Saja</button>
    </div>
</div>

<button id="installFloat" onclick="triggerInstall()">📲 INSTALL</button>

<div class="category" id="cat-bar">
    <button class="active" onclick="filter('all', this)">Semua</button>
</div>

<div class="container" id="list">Memuat...</div>

<!-- Bagian Keranjang Belanja -->
<div id="cart" class="hide">
    <div class="cart-left">
        <button onclick="resetCart()" style="background:var(--danger); border:none; padding:8px; border-radius:8px; color:#fff; cursor:pointer;">🗑️hapus</button>
    </div>
    <div class="cart-right">
        <!-- Tambahan Input Data Pembeli -->
        <input type="text" id="buyer-name" placeholder="Nama Penerima" style="width:100%; margin-bottom:5px; padding:8px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;">
        <textarea id="buyer-addr" placeholder="Alamat & Kota" style="width:100%; margin-bottom:5px; padding:8px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;"></textarea>
        
        <div id="cart-list"></div>
        <div id="total">Rp 0</div>
        <!-- Tombol sekarang memanggil fungsi handleKirimWA() -->
        <button id="btn-wa" onclick="handleKirimWA()" style="background:var(--wa); color:#fff; border:none; padding:10px 20px; border-radius:8px; width:100%; font-weight:bold; cursor:pointer;">KIRIM WA</button>
    </div>
</div>

<div id="zoomModal" onclick="this.style.display='none'; document.body.style.overflow='auto';">
    <img id="img-zoomed" src="">
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyhgdk0elMuqM4-00OIR8zbUqp-k80RnbuYyPDDqGHsEk7aSCg60kgT5HTYL_hIVSDc/exec";
    let produk = [];
    let order = {};
    let deferredPrompt;

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        setTimeout(() => { document.getElementById('installModal').style.display = 'flex'; }, 3000);
    });

    function closePromo() {
        document.getElementById('installModal').style.display = 'none';
        document.getElementById('installFloat').style.display = 'block';
    }

    function triggerInstall() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt = null;
        }
    }

    function rupiah(n) { return "Rp " + n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); }

    async function load() {
        const cachedProduk = localStorage.getItem("duta_terang_cache");
        if (cachedProduk) {
            produk = JSON.parse(cachedProduk);
            render();
            loadFromLocal();
        }

        try {
            const res = await fetch(API_URL);
            const dataTerbaru = await res.json();
            if (JSON.stringify(dataTerbaru) !== cachedProduk) {
                produk = dataTerbaru;
                localStorage.setItem("duta_terang_cache", JSON.stringify(produk));
                render();
                loadFromLocal();
            }
        } catch (e) {
            if (!cachedProduk) document.getElementById("list").innerText = "Gagal memuat. Periksa koneksi.";
        }
    }

    function render() {
        let html = "";
        let kategori = new Set();
        produk.forEach(p => {
            if (!p.nama) return;
            kategori.add(p.kategori || "Lainnya");
            
            let disc = Number(p.diskon) || 0;
            let hrgFix = p.harga - (p.harga * disc / 100);
            
            let isHabis = (p.stok !== undefined && p.stok <= 0); 
            let styleHabis = isHabis ? 'style="opacity: 0.5; filter: grayscale(1);"' : '';
            let btnDisabled = isHabis ? 'disabled style="background:#ccc; cursor:not-allowed;"' : '';

            html += `
            <div class="card" data-cat="${(p.kategori || 'Lainnya').toLowerCase()}" ${styleHabis}>
                ${isHabis ? `<div style="position:absolute; top:5px; left:5px; background:var(--danger); color:white; font-size:9px; padding:2px 6px; border-radius:4px; z-index:10; font-weight:bold;">HABIS</div>` : ''}
                ${disc > 0 && !isHabis ? `<div style="position:absolute; top:5px; right:5px; background:var(--danger); color:white; font-size:9px; padding:1px 4px; border-radius:4px;">-${disc}%</div>` : ''}
                <img src="${p.gambar || 'https://via.placeholder.com/150'}" onclick="${isHabis ? '' : `openZoom('${p.gambar}')`}">
                <div style="margin-top:6px; flex-grow:1;">
                    <b style="font-size:12px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; height:30px; line-height:1.2;">${p.nama}</b>
                    <div style="margin:4px 0;">
                        ${disc > 0 ? `<span class="price-old">${rupiah(p.harga)}</span>` : '<div style="height:15px"></div>'}
                        <span class="price-new">${rupiah(hrgFix)}</span>
                    </div>
                    <div class="qty">
                        <button ${btnDisabled} onclick="changeQty('${p.id}', -1, ${hrgFix}, '${p.nama}')">-</button>
                        <span id="qty-${p.id}" style="font-size:13px">0</span>
                        <button ${btnDisabled} onclick="changeQty('${p.id}', 1, ${hrgFix}, '${p.nama}')">+</button>
                    </div>
                </div>
            </div>`;
        });
        document.getElementById("list").innerHTML = html;
        
        let catHtml = '<button class="active" onclick="filter(\'all\', this)">Semua</button>';
        kategori.forEach(k => { catHtml += `<button onclick="filter('${k.toLowerCase()}', this)">${k}</button>`; });
        document.getElementById("cat-bar").innerHTML = catHtml;
    }

    function changeQty(id, delta, price, name) {
        const item = produk.find(p => String(p.id) === String(id));
        if (item && item.stok <= 0 && delta > 0) {
            alert("Maaf, stok barang ini sedang kosong.");
            return;
        }

        if (!order[id]) order[id] = { qty: 0, name, price };
        order[id].qty += delta;
        if (order[id].qty < 0) order[id].qty = 0;
        
        const el = document.getElementById(`qty-${id}`);
        if(el) el.innerText = order[id].qty;
        updateCart();
    }

    function updateCart() {
        let totalHarga = 0;
        let waText = "Halo Duta Terang, saya mau pesan:%0A%0A";
        let listHtml = "";
        let adaBarang = false;

        for (let id in order) {
            if (order[id].qty > 0) {
                adaBarang = true;
                totalHarga += (order[id].qty * order[id].price);
                listHtml += `<div style="margin-bottom:2px;">${order[id].name} (x${order[id].qty})</div>`;
                waText += `✅ ${order[id].name} (x${order[id].qty})%0A`;
            }
        }

        document.getElementById("cart-list").innerHTML = listHtml;
        document.getElementById("total").innerText = rupiah(totalHarga);
        document.getElementById("btn-wa").href = "https://wa.me/6288224166270?text=" + waText + "%0A*Total: " + rupiah(totalHarga) + "*";
        
        const cartEl = document.getElementById("cart");
        if (adaBarang) cartEl.classList.remove("hide");
        else cartEl.classList.add("hide");
        
        localStorage.setItem("duta_terang_cart", JSON.stringify({ order }));
    }
// Tambahkan di dalam <script>

async function handleKirimWA() {
    const btn = document.getElementById("btn-wa");
    const nama = document.getElementById("buyer-name").value;
    const alamat = document.getElementById("buyer-addr").value;

    if (!nama || !alamat) {
        alert("Mohon isi Nama dan Alamat dulu ya kak.");
        return;
    }

    // Ubah tampilan tombol saat proses simpan
    const originalText = btn.innerText;
    btn.innerText = "⏳ Menyimpan...";
    btn.style.pointerEvents = "none";

    let totalHarga = 0;
    let listPesanan = "";
    let waText = `Halo Duta Terang, saya mau pesan:%0A%0A`;
    
    for (let id in order) {
        if (order[id].qty > 0) {
            totalHarga += (order[id].qty * order[id].price);
            listPesanan += `${order[id].name} (x${order[id].qty}), `;
            waText += `✅ *${order[id].name}* (x${order[id].qty})%0A`;
        }
    }

    const dataPesanan = {
        nama: nama,
        alamat: alamat,
        pesanan: listPesanan,
        total: totalHarga
    };

    try {
        // Kirim ke Google Sheets
        await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify(dataPesanan)
        });
        
        // Simpan identitas ke local agar besok tidak perlu ketik lagi
        localStorage.setItem("duta_terang_user", JSON.stringify({nama, alamat}));

        // Buka WA
        waText += `%0A💰 *Total: ${rupiah(totalHarga)}*`;
        waText += `%0A%0A👤 *Data Pengirim:*%0A- Nama: ${nama}%0A- Alamat: ${alamat}`;
        
        window.location.href = "https://wa.me/6288224166270?text=" + waText;
        
    } catch (e) {
        console.error(e);
        alert("Gagal terhubung ke server, tapi tetap bisa order via WA.");
        window.location.href = "https://wa.me/6288224166270?text=" + waText;
    } finally {
        btn.innerText = originalText;
        btn.style.pointerEvents = "auto";
    }
}

// Update fungsi loadFromLocal agar otomatis isi nama & alamat
function loadFromLocal() {
    // ... kode load cart Anda yang lama ...
    
    const user = localStorage.getItem("duta_terang_user");
    if (user) {
        const userData = JSON.parse(user);
        if(document.getElementById("buyer-name")) document.getElementById("buyer-name").value = userData.nama;
        if(document.getElementById("buyer-addr")) document.getElementById("buyer-addr").value = userData.alamat;
    }
}
    function filter(cat, btn) {
        document.querySelectorAll(".card").forEach(c => {
            c.style.display = (cat === 'all' || c.dataset.cat === cat) ? 'flex' : 'none';
        });
        document.querySelectorAll(".category button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
    }

    function resetCart() {
        if(confirm("Hapus pesanan?")) {
            order = {};
            localStorage.removeItem("duta_terang_cart");
            document.querySelectorAll("[id^='qty-']").forEach(el => el.innerText = "0");
            updateCart();
        }
    }

    function loadFromLocal() {
        const saved = localStorage.getItem("duta_terang_cart");
        if (saved) {
            order = JSON.parse(saved).order;
            updateCart();
            for (let id in order) {
                const el = document.getElementById(`qty-${id}`);
                if (el) el.innerText = order[id].qty;
            }
        }
    }

    function openZoom(imgUrl) {
        if(!imgUrl || imgUrl === 'undefined') return;
        document.getElementById("img-zoomed").src = imgUrl;
        document.getElementById("zoomModal").style.display = "flex";
        document.body.style.overflow = "hidden";
    }

    function updateWaktu() {
        const sekarang = new Date();
        const opsi = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
        document.getElementById("jam-sekarang").innerText = sekarang.toLocaleDateString('id-ID', opsi).replace('.', ':');
    }

    setInterval(updateWaktu, 60000);
    updateWaktu();
    load();
</script>
</body>
</html>

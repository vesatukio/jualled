<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Duta Terang LED</title>
    <style>
        :root { --primary: #00bcd4; --pink: #e91e63; --wa: #25D366; --danger: #ff4d4d; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f5f6f8; padding-bottom: 240px; }
        header { background: var(--primary); color: #fff; padding: 12px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        
        /* BADGE DISKON & HABIS */
        .badge-disc { position: absolute; top: 5px; right: 5px; background: var(--danger); color: white; font-size: 9px; padding: 2px 5px; border-radius: 4px; z-index: 1; }
        .badge-habis { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.7); color: #000; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; border-radius: 10px; z-index: 2; }

        /* KATEGORI */
        .category { display: flex; gap: 8px; padding: 10px; background: #fff; overflow-x: auto; border-bottom: 1px solid #eee; }
        .category button { border: 1px solid #ddd; padding: 5px 12px; border-radius: 15px; background: #fff; font-size: 11px; white-space: nowrap; }
        .category button.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* PRODUK */
        .container { padding: 8px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .card { background: #fff; border-radius: 10px; padding: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: relative; display: flex; flex-direction: column; }
        .card img { width: 100%; height: 100px; object-fit: contain; border-radius: 8px; }
        
        .qty { display: flex; justify-content: space-between; align-items: center; background: #f1f3f4; border-radius: 6px; margin-top: 8px; }
        .qty button { width: 28px; height: 28px; border: none; background: var(--primary); color: #fff; border-radius: 4px; }

        /* FORM & KERANJANG RINGKAS */
        #cart { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; padding: 10px; border-radius: 15px 15px 0 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); z-index: 1001; }
        .form-mini { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 8px; }
        .form-mini input, .form-mini select { padding: 6px; border: 1px solid #ddd; border-radius: 5px; font-size: 11px; outline: none; }
        .full-width { grid-column: span 2; }

        .cart-bottom { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid #eee; padding-top: 8px; }
        #btn-wa { background: var(--wa); color: white; text-decoration: none; padding: 8px 15px; border-radius: 6px; font-size: 13px; font-weight: bold; }
        
        .hide { display: none; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 14px; font-weight: bold;">DUTA TERANG LED</div>
    <div style="font-size: 10px; background: rgba(0,0,0,0.2); padding: 4px 8px; border-radius: 10px;">
        📲 <span id="user-count">1.2k</span> Terpasang
    </div>
</header>

<div class="category" id="cat-bar"></div>

<div class="container" id="list">Memuat...</div>

<div id="cart" class="hide">
    <!-- FORM ALAMAT SANGAT RINGKAS -->
    <div class="form-mini">
        <input type="text" id="f_nama" class="full-width" placeholder="Nama Pemesan">
        <input type="text" id="f_almt" class="full-width" placeholder="Alamat (Jl / No / Patokan)">
        <input type="text" id="f_rtrw" placeholder="RT/RW">
        <input type="text" id="f_desa" placeholder="Desa">
        <input type="text" id="f_kec" placeholder="Kecamatan">
        <input type="text" id="f_kab" placeholder="Kab/Kota">
        <input type="text" id="f_prov" placeholder="Provinsi">
        <select id="f_bayar">
            <option value="COD">Bayar COD</option>
            <option value="Transfer">Transfer</option>
        </select>
    </div>

    <div class="cart-bottom">
        <button onclick="resetCart()" style="background:var(--danger); border:none; padding:8px; border-radius:5px; color:#fff; cursor:pointer;">🗑️</button>
        
        <div style="text-align: right; flex-grow: 1; margin-right: 15px;">
            <div id="cart-summary" style="font-size: 10px; color: #666; max-height: 30px; overflow: hidden;"></div>
            <div id="total" style="font-size: 16px; font-weight: 900; color: var(--pink);">Rp 0</div>
        </div>

        <a id="btn-wa" href="javascript:void(0)" onclick="kirimWA()">ORDER WA</a>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyhgdk0elMuqM4-00OIR8zbUqp-k80RnbuYyPDDqGHsEk7aSCg60kgT5HTYL_hIVSDc/exec";
    const WA_NUMBER = "6288224166270";
    let produk = [], order = {};

    async function load() {
        try {
            const res = await fetch(API_URL);
            produk = await res.json();
            render();
        } catch (e) { document.getElementById("list").innerText = "Gagal memuat."; }
    }

    function render() {
        let html = "", kategori = new Set();
        produk.forEach(p => {
            if (!p.nama) return;
            kategori.add(p.kategori || "Lainnya");
            const disc = Number(p.diskon) || 0;
            const hrgFix = p.harga - (p.harga * disc / 100);
            const isHabis = p.stok <= 0;

            html += `
            <div class="card" data-cat="${(p.kategori || 'Lainnya').toLowerCase()}">
                ${isHabis ? '<div class="badge-habis">HABIS</div>' : ''}
                ${disc > 0 ? `<div class="badge-disc">-${disc}%</div>` : ''}
                <img src="${p.gambar || 'https://via.placeholder.com/150'}">
                <b style="font-size:11px; margin-top:5px; height:28px; overflow:hidden;">${p.nama}</b>
                <span style="color:var(--pink); font-weight:bold; font-size:13px;">Rp ${hrgFix.toLocaleString('id-ID')}</span>
                <div class="qty">
                    <button onclick="changeQty('${p.id}', -1, ${hrgFix}, '${p.nama}')" ${isHabis?'disabled':''}>-</button>
                    <span id="qty-${p.id}" style="font-size:12px;">0</span>
                    <button onclick="changeQty('${p.id}', 1, ${hrgFix}, '${p.nama}')" ${isHabis?'disabled':''}>+</button>
                </div>
            </div>`;
        });
        document.getElementById("list").innerHTML = html;
        
        let catHtml = '<button class="active" onclick="filter(\'all\', this)">Semua</button>';
        kategori.forEach(k => catHtml += `<button onclick="filter('${k.toLowerCase()}', this)">${k}</button>`);
        document.getElementById("cat-bar").innerHTML = catHtml;
    }

    function changeQty(id, delta, price, name) {
        if (!order[id]) order[id] = { qty: 0, name, price };
        order[id].qty += delta;
        if (order[id].qty <= 0) delete order[id];
        const el = document.getElementById(`qty-${id}`);
        if (el) el.innerText = order[id] ? order[id].qty : 0;
        updateCart();
    }

    function updateCart() {
        let total = 0, summary = "";
        for (let id in order) {
            total += (order[id].qty * order[id].price);
            summary += `${order[id].name} (x${order[id].qty}), `;
        }
        document.getElementById("total").innerText = "Rp " + total.toLocaleString('id-ID');
        document.getElementById("cart-summary").innerText = summary.slice(0, -2);
        document.getElementById("cart").classList.toggle("hide", total === 0);
    }

    function kirimWA() {
        const n = document.getElementById("f_nama").value;
        const a = document.getElementById("f_almt").value;
        if(!n || !a) return alert("Nama & Alamat wajib diisi!");

        let m = `*PESANAN DUTA TERANG*\n\n`;
        for(let id in order) m += `• ${order[id].name} (x${order[id].qty})\n`;
        m += `\n*Total: ${document.getElementById("total").innerText}*\n\n`;
        m += `👤 *Penerima:* ${n}\n📍 *Alamat:* ${a}\n🏠 *RT/RW:* ${document.getElementById("f_rtrw").value}, *Desa:* ${document.getElementById("f_desa").value}\n🏘️ *Kec:* ${document.getElementById("f_kec").value}, *Kab:* ${document.getElementById("f_kab").value}\n💳 *Bayar:* ${document.getElementById("f_bayar").value}`;

        window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(m)}`);
    }

    function filter(cat, btn) {
        document.querySelectorAll(".card").forEach(c => c.style.display = (cat==='all' || c.dataset.cat===cat)?'flex':'none');
        document.querySelectorAll(".category button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
    }

    function resetCart() {
        order = {};
        document.querySelectorAll("[id^='qty-']").forEach(e => e.innerText = "0");
        updateCart();
    }

    load();
</script>
</body>
</html>
